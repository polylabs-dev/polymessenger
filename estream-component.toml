[package]
name = "polymessenger"
version = "0.12.0"
description = "PQ encrypted messaging with blind relay, double-ratchet forward secrecy, RBAC, and incognito mode"
license = "LicenseRef-PolyQuantum-Commercial"
repository = "https://github.com/polylabs-dev/polymessenger"

[publisher]
id = "polylabs-dev"
name = "Poly Labs"
signing_key_id = "polylabs-prime-v1"

[escir]
api_version = "0.12.0"
min_platform_version = "0.12.0"

[dependencies]
polykit = ">=0.4.0"

[pricing]
license_type = "per-invocation"
share_price = "0.0004"
private_price = "0.0006"

[telemetry]
schema_hash = "auto"

[telemetry.metrics]
messages_relayed = "counter"
relay_latency_ms = "gauge"
cover_traffic_ratio = "gauge"
session_creates = "counter"
encrypt_ops = "counter"
ratchet_advances = "counter"
incognito_activations = "counter"
role_assignments = "counter"
permission_checks = "counter"
cover_packets_generated = "counter"

[telemetry.privacy]
aggregate_window = "1h"
cohort_min_size = 50
noise_budget = "1.0"

[component.include]
circuits = ["circuits/fl/*.fl", "circuits/fl/graphs/*.fl"]
tests = ["test_vectors/*.esz"]
docs = ["docs/*.md"]
